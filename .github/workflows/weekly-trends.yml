name: Weekly Trend Refresh

on:
  schedule:
    - cron: '0 0 * * 1' # 매주 월요일 오전 09시 KST (00:00 UTC)
  workflow_dispatch: # 수동 실행 가능

jobs:
  refresh-trends:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 레포지토리에 커밋하고 푸시할 권한 필요
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update Trends Data
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/update-trends.js

      - name: Check for changes
        id: git-check
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/trends.json
          git status
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git commit -m "chore: weekly trend refresh ($(date +'%Y-%m-%d'))"
          git push
